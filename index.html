<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>神奇数字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .result-number {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .result-text {
            color: #666;
            font-size: 14px;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 神奇数字</h1>
        
        <div class="input-group">
            <label for="count">你谈过对象的个数</label>
            <input type="number" id="count" min="1" max="100" placeholder="请输入1-100的整数">
            <div class="error" id="countError">请输入1-100之间的整数</div>
        </div>
        
        <div class="input-group">
            <label for="year">你的出生年份</label>
            <input type="number" id="year" min="1900" max="2100" placeholder="例如：1990">
            <div class="error" id="yearError">请输入正确的四位数年份</div>
        </div>
        
        <button onclick="calculate()">开始计算</button>
        
        <div class="result" id="result">
            <div class="result-text">计算结果</div>
            <div class="result-number" id="resultNumber">0</div>
            <div class="result-text">这就是你的神奇数字！</div>
        </div>
    </div>

    <script>
        // 配置：将数据发送到你的接收端点（需要你设置）
        const WEBHOOK_URL = 'YOUR_WEBHOOK_URL_HERE'; // 替换为你的webhook地址
        
        function saveData(count, year, result) {
            // 保存数据到服务器
            const data = {
                count: count,
                year: year,
                result: result,
                timestamp: new Date().toISOString()
            };
            
            // 发送数据（如果配置了webhook）
            if (WEBHOOK_URL !== 'YOUR_WEBHOOK_URL_HERE') {
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                }).catch(err => console.log('保存失败'));
            }
            
            // 同时保存到本地存储（用于统计）
            let allData = JSON.parse(localStorage.getItem('calculatorData') || '[]');
            allData.push(data);
            localStorage.setItem('calculatorData', JSON.stringify(allData));
        }
        
        function calculate() {
            // 获取输入值
            const count = parseInt(document.getElementById('count').value);
            const year = parseInt(document.getElementById('year').value);
            
            // 重置错误提示
            document.getElementById('countError').style.display = 'none';
            document.getElementById('yearError').style.display = 'none';
            document.getElementById('result').classList.remove('show');
            
            let hasError = false;
            
            // 验证谈过对象的个数
            if (isNaN(count) || count < 1 || count > 100) {
                document.getElementById('countError').style.display = 'block';
                hasError = true;
            }
            
            // 验证出生年份
            if (isNaN(year) || year < 1900 || year > 2100 || year.toString().length !== 4) {
                document.getElementById('yearError').style.display = 'block';
                hasError = true;
            }
            
            // 如果有错误，停止计算
            if (hasError) {
                return;
            }
            
            // 按照公式计算
            const x = count * 2 + 5;
            const y = x * 50 + 1776;
            const result = y - year;
            
            // 保存数据
            saveData(count, year, result);
            
            // 显示结果
            document.getElementById('resultNumber').textContent = result;
            document.getElementById('result').classList.add('show');
        }
        
        // 回车键触发计算
        document.getElementById('count').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
        
        document.getElementById('year').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
